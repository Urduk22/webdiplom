{% extends "base.html" %}
{% block title %}Создание опроса{% endblock %}
{% block content %}
<div class="card">
    <h1>Создание нового опроса</h1>
    <form id="surveyForm" action="/api/surveys" method="post">
        <div class="form-group">
            <label>Название опроса:</label>
            <input type="text" name="title" id="title" required>
        </div>
        <div class="form-group">
            <label>Описание:</label>
            <textarea name="description" id="description" rows="3"></textarea>
        </div>
        <h2>Вопросы</h2>
        <div id="questions"></div>
        <button type="button" onclick="addQuestion()">+ Добавить вопрос</button>
        <button type="submit" style="margin-top: 1rem;">Создать опрос</button>
    </form>
</div>

<script>
    let questionCount = 0;
    function addQuestion() {
        const container = document.getElementById('questions');
        const div = document.createElement('div');
        div.className = 'card';
        div.id = `q_${questionCount}`;
        div.innerHTML = `
            <label>Текст вопроса:</label>
            <input type="text" name="q_${questionCount}_text" required>
            <label>Тип вопроса:</label>
            <select name="q_${questionCount}_type" onchange="changeType(${questionCount})">
                <option value="text">Текстовый ответ</option>
                <option value="single">Одиночный выбор</option>
                <option value="multiple">Множественный выбор</option>
                <option value="scale">Числовая шкала</option>
            </select>
            <div id="options_${questionCount}"></div>
            <div id="scale_range_${questionCount}" style="display:none; margin-top: 10px;">
                <label>Мин. значение: <input type="number" name="q_${questionCount}_scale_min" value="1"></label>
                <label>Макс. значение: <input type="number" name="q_${questionCount}_scale_max" value="10"></label>
            </div>
            <button type="button" onclick="removeQuestion(${questionCount})">Удалить вопрос</button>
        `;
        container.appendChild(div);
        questionCount++;
    }
    function changeType(index) {
        const type = document.querySelector(`[name="q_${index}_type"]`).value;
        const optionsDiv = document.getElementById(`options_${index}`);
        const scaleDiv = document.getElementById(`scale_range_${index}`);
        optionsDiv.innerHTML = '';
        if (type === 'single' || type === 'multiple') {
            optionsDiv.innerHTML = `<textarea name="q_${index}_options" rows="4" placeholder="Вариант 1\nВариант 2\nВариант 3"></textarea>`;
            if (scaleDiv) scaleDiv.style.display = 'none';
        } else if (type === 'scale') {
            if (scaleDiv) scaleDiv.style.display = 'block';
        } else {
            if (scaleDiv) scaleDiv.style.display = 'none';
        }
    }
    function removeQuestion(index) {
        const el = document.getElementById(`q_${index}`);
        if (el) el.remove();
    }
    document.getElementById('surveyForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const title = document.getElementById('title').value;
        const description = document.getElementById('description').value;
        const questions = [];
        for (let i = 0; i < questionCount; i++) {
            const textInput = document.querySelector(`[name="q_${i}_text"]`);
            if (!textInput) continue;
            const text = textInput.value;
            const type = document.querySelector(`[name="q_${i}_type"]`).value;
            const optionsTextarea = document.querySelector(`[name="q_${i}_options"]`);
            let options = [];
            if (optionsTextarea) options = optionsTextarea.value.split('\n').filter(o => o.trim() !== '');
            const scaleMin = document.querySelector(`[name="q_${i}_scale_min"]`)?.value || 1;
            const scaleMax = document.querySelector(`[name="q_${i}_scale_max"]`)?.value || 10;
            questions.push({ text, question_type: type, order: i, options, scale_min: parseInt(scaleMin), scale_max: parseInt(scaleMax) });
        }
        fetch('/api/surveys', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, description, questions })
        }).then(response => {
            if (response.redirected) window.location.href = response.url;
            else alert('Ошибка');
        });
    });
</script>
{% endblock %}
