{% extends "base.html" %}
{% block title %}Анализ данных опросов{% endblock %}
{% block content %}
<div class="card">
    <h1>Анализ данных социологических опросов</h1>
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
    <form action="/analyze" method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label>Выберите файл (CSV, Excel, ODS):</label>
            <input type="file" name="file" accept=".csv,.xls,.xlsx,.ods" required>
        </div>

        <h2>Настройки предобработки</h2>
        <label><input type="checkbox" name="drop_first"> Удалить первый столбец</label>
        <label><input type="checkbox" name="fill_na_zero" checked> Замена пустых строк на 0</label>
        <label><input type="checkbox" name="encode_cat"> One-Hot кодирование категорий</label>
        <div style="margin-left: 25px;">
            <label>Макс. уникальных значений: <input type="number" name="max_cat" value="10" min="2" max="100"></label>
        </div>
        <label>Порог корреляции: <input type="number" name="threshold" value="0.3" step="0.05" min="0" max="1"></label>
        <label>Целевой столбец (необязательно): <input type="text" name="target_column" placeholder="название столбца"></label>

        <h2>Метод отбора признаков</h2>
        <select name="method">
            <option value="graph">Графовый алгоритм</option>
            <option value="correlation">Корреляция с целевым</option>
            <option value="anova">ANOVA / F-тест</option>
            <option value="pca">PCA</option>
        </select>
        <label>Количество лучших признаков: <input type="number" name="top_k" value="10" min="1"></label>

        <h2>Параметры графового алгоритма</h2>
        <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
            <label>Запусков: <input type="number" name="n_launches" value="10" min="1"></label>
            <label>Решений: <input type="number" name="n_solutions" value="100" min="1"></label>
            <label>Cap: <input type="number" name="cap" value="1000" min="1"></label>
            <label>Frac: <input type="number" name="frac" value="0.35" step="0.05" min="0" max="1"></label>
            <label>q: <input type="number" name="q" value="1.0" step="0.1"></label>
        </div>

        <button type="submit" style="margin-top: 1.5rem;">Запустить анализ</button>
    </form>
</div>
{% endblock %}
